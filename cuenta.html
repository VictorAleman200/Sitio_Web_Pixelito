<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/cuenta.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <header>
        <img src="imgs/prueba-removebg-preview.png" alt="" class="logo">
        <a href="index.html" class="seccion" title="Inicio">Inicio</a>
        <a href="shop.html" class="seccion" title="Tienda">Tienda</a>
        <a href="contacto.html" class="seccion" title="Contacto">Contacto</a>
        <div>
            <a href="cuenta.html" title="Cuenta">
            <img src="" alt="">
            red 1
        </a>
        <a href="carrito.html">
            <img src="" alt="">
            des
        </a>
        </div>
        
    </header>
    <main>
    <div class="page-wrapper">

      <!-- REGISTRO -->
      <div class="form-card register">
        <h2>Registro</h2>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" placeholder="Tu nombre completo"/>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@ejemplo.com"/>
        </div>
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" placeholder="nombre_usuario"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••"/>
        </div>
        <div class="form-group">
          <label>Repetir contraseña</label>
          <input type="password" placeholder="••••••••"/>
        </div>
        <div class="form-check">
          <input type="checkbox" id="terms"/>
          <label for="terms">Acepto los términos y condiciones</label>
        </div>
        <button class="btn btn-primary btn-full">REGISTRARME</button>
        <p class="form-footer">¿Ya tienes cuenta? <a href="#" onclick="switchToLogin()">Inicia sesión</a></p>
      </div>

      <!-- INICIO DE SESIÓN -->
      <div class="form-card login">
        <h2>Iniciar sesión</h2>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="correo@ejemplo.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••"/>
        </div>
        <div class="form-extra">
          <label style="display:flex;align-items:center;gap:0.4rem;">
            <input type="checkbox" style="accent-color:var(--primary);"/> Recordarme
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <button class="btn btn-primary btn-full">INICIAR SESIÓN</button>
        <p class="form-footer">¿No tienes cuenta? <a href="#" onclick="switchToRegister()">Regístrate</a></p>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-top">
      <div class="footer-brand">
        <div class="logo-placeholder">PX</div>
        <span>Arte pixel a pixel</span>
      </div>
      <div class="footer-map">
        <h4>MAPA DE SITIO</h4>
        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html">Contacto</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>Todos los derechos reservados.</span>
      <div class="footer-bottom-links">
        <a href="#">Aviso de privacidad</a>
        <a href="#">Términos de uso</a>
      </div>
    </div>
  </footer>
</body>
</html>

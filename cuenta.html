      <form method="post" action="archivo.php" class="form-card register">
        <h2>Registro</h2>
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Tu nombre completo" required/>
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="correo@ejemplo.com" required/>
        </div>
        <div class="form-group">
          <label for="user">Usuario</label>
          <input type="text" id="user" placeholder="nombre_usuario" required/>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
        <div class="form-group">
          <label for="verpassword">Repetir contraseña</label>
          <input type="password" id="verpassword" placeholder="••••••••" required/>
        </div>
        <div class="form-check">
          <input type="checkbox" id="terms" required/>
          <label for="terms">Acepto los términos y condiciones</label>
        </div>
        <button class="btn">REGISTRARME</button>
        <p class="form-footer">¿Ya tienes cuenta? <a href="#" class="switch" onclick="switchToLogin()">Inicia sesión</a></p>
      </form>

      
      <form method="post" action="archivo.php" class="form-card login">
        <h2>Iniciar sesion</h2>
        <div class="form-group">

          <input type="email" id="email" placeholder="correo@ejemplo.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
        <div class="form-extra">
          <label>
            <input type="checkbox" /> Recordarme
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <button class="btn">INICIAR SESIÓN</button>
        <p class="form-footer">¿No tienes cuenta? <a href="#" class="switch" onclick="switchToRegister()">Regístrate</a></p>
